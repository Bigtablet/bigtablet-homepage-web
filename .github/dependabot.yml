version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    target-branch: develop
    labels:
      - dependencies
    commit-message:
      prefix: "config"
    groups:
      # react 계열은 버전이 같이 가야 하므로 한 PR로 묶음 (react-dom 누락 방지)
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
    ignore:
      # major 버전 업은 수동으로 검토
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Seoul"
    target-branch: develop
    labels:
      - dependencies
    commit-message:
      prefix: "config"
    ignore:
      # major 버전 업은 수동으로 검토
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

