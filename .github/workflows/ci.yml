name: CI

# 문서/워크플로 전용 변경은 skip — 코드에 영향 없으므로 lint/type/test/build 불필요.
on:
  pull_request:
    branches: [develop, main]
    paths-ignore:
      - "**/*.md"
      - ".github/**"
      - ".claude/**"
  push:
    branches: [develop]
    paths-ignore:
      - "**/*.md"
      - ".github/**"
      - ".claude/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    # develop 브랜치 대상 PR에서만 실행, dependabot PR은 제외
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' && github.base_ref == 'develop'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint commit messages
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  validate:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SERVER_URL: http://127.0.0.1:1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1
          include-hidden-files: true

  e2e:
    runs-on: ubuntu-latest
    needs: validate
    # 릴리스 전 main PR 에서만 실행. develop 사이클에선 비용 큼 → skip.
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SERVER_URL: http://127.0.0.1:1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E tests
        run: pnpm e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
