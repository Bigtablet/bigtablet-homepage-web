name: Lighthouse CI

# 릴리스 후 prod 측정만 — PR 시점 측정은 의미 없음. prod 는 PR 코드 포함 안 하므로
# PR-time Lighthouse 는 이전 릴리스 점수만 반복 측정. 트리거:
#   1. tag push → 릴리스 직후 prod 재배포된 baseline 측정
#   2. workflow_dispatch → 회귀 의심 시 수동 측정
# 실사용자 perf 추적은 Sentry web-vitals RUM 으로 보완.
on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [mobile, desktop]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for production deploy
        # tag push 시 deploy.yml 이 Docker 이미지 빌드/푸시 → 별도 CD 가 prod 반영하는 데 시간 필요.
        # 5분 대기 후 측정. 부족하면 workflow_dispatch 로 재실행.
        if: github.event_name == 'push'
        run: sleep 300

      - name: Run Lighthouse CI (${{ matrix.preset }})
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.${{ matrix.preset }}.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          artifactName: lighthouse-results-${{ matrix.preset }}

      - name: Post Lighthouse report to commit
        # tag push 시에만 commit comment 로 기록. workflow_dispatch 는 commit 컨텍스트 약함 → skip.
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        env:
          PRESET: ${{ matrix.preset }}
        with:
          script: |
            const results = ${{ steps.lhci.outputs.manifest }};
            const links = ${{ steps.lhci.outputs.links }};
            const preset = process.env.PRESET;
            const presetLabel = preset === 'mobile' ? '📱 Mobile' : '🖥 Desktop';

            const rows = results.map((r) => {
              const url = new URL(r.url);
              const path = url.pathname;
              const s = (v) => Math.round(v * 100);
              const emoji = (v) => (v >= 0.9 ? '🟢' : v >= 0.5 ? '🟠' : '🔴');
              const perf = r.summary.performance;
              const a11y = r.summary.accessibility;
              const bp = r.summary['best-practices'];
              const seo = r.summary.seo;
              const link = links[r.url] || '';
              return `| [${path}](${link}) | ${emoji(perf)} ${s(perf)} | ${emoji(a11y)} ${s(a11y)} | ${emoji(bp)} ${s(bp)} | ${emoji(seo)} ${s(seo)} |`;
            });

            const body = [
              `### ⚡ Lighthouse Report — ${presetLabel} (release ${context.ref.replace('refs/tags/', '')})`,
              '',
              '| Page | Performance | Accessibility | Best Practices | SEO |',
              '|------|:-----------:|:------------:|:--------------:|:---:|',
              ...rows,
              '',
              '> Measured against https://bigtablet.com after release deploy',
            ].join('\n');

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body,
            });
