name: Lighthouse CI

# 릴리스 후 prod 측정 — workflow_run 으로 deploy.yml 완료 후 시작.
# 추가로 polling 단계가 prod HTML 의 <meta name="build-sha"> 가 트리거 commit 과 일치할 때까지 대기.
# 두 단계 모두 통과 후에야 lighthouse 가 실 prod 측정 → 이전 릴리스 점수 측정 risk 제거.
on:
  workflow_run:
    workflows: ["Release CI/CD using GitHub Actions & Docker"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    # deploy 가 성공한 경우만 (실패 시 prod 안 바뀜 → 측정 의미 없음)
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [mobile, desktop]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for production to serve new build SHA
        # prod 의 <meta name="build-sha"> 값이 트리거된 commit SHA 와 일치할 때까지 polling.
        # 10초 간격, 최대 5분. workflow_dispatch 는 SHA 모르므로 짧은 sleep 만.
        if: github.event_name == 'workflow_run'
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          for i in $(seq 1 30); do
            ACTUAL=$(curl -sS https://bigtablet.com/ | grep -oE 'name="build-sha"[^>]*content="[^"]+"' | grep -oE 'content="[^"]+"' | sed 's/content="\(.*\)"/\1/')
            echo "attempt $i: prod sha=$ACTUAL expected=$EXPECTED_SHA"
            if [ "$ACTUAL" = "$EXPECTED_SHA" ]; then
              echo "prod is on new build, proceeding"
              exit 0
            fi
            sleep 10
          done
          echo "prod did not pick up new SHA in 5 minutes — measuring anyway, results may reflect old build" >&2

      - name: Run Lighthouse CI (${{ matrix.preset }})
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.${{ matrix.preset }}.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          artifactName: lighthouse-results-${{ matrix.preset }}

      - name: Write Lighthouse report to step summary
        # Actions 탭의 run 페이지 "Summary" 에 표 출력.
        uses: actions/github-script@v7
        env:
          PRESET: ${{ matrix.preset }}
        with:
          script: |
            const fs = require('fs');
            const results = ${{ steps.lhci.outputs.manifest }};
            const links = ${{ steps.lhci.outputs.links }};
            const preset = process.env.PRESET;
            const presetLabel = preset === 'mobile' ? '📱 Mobile' : '🖥 Desktop';

            const rows = results.map((r) => {
              const url = new URL(r.url);
              const path = url.pathname;
              const s = (v) => Math.round(v * 100);
              const emoji = (v) => (v >= 0.9 ? '🟢' : v >= 0.5 ? '🟠' : '🔴');
              const perf = r.summary.performance;
              const a11y = r.summary.accessibility;
              const bp = r.summary['best-practices'];
              const seo = r.summary.seo;
              const link = links[r.url] || '';
              return `| [${path}](${link}) | ${emoji(perf)} ${s(perf)} | ${emoji(a11y)} ${s(a11y)} | ${emoji(bp)} ${s(bp)} | ${emoji(seo)} ${s(seo)} |`;
            });

            const lines = [
              `### ⚡ Lighthouse Report — ${presetLabel}`,
              '',
              '| Page | Performance | Accessibility | Best Practices | SEO |',
              '|------|:-----------:|:------------:|:--------------:|:---:|',
              ...rows,
              '',
              '> Measured against https://bigtablet.com',
            ];
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');
