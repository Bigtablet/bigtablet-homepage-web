name: Lighthouse CI

# 릴리스 전 main PR 에서만 실행. develop 사이클에선 비용 큼 → skip.
# 문서/워크플로 전용 변경도 skip. 수동 트리거(workflow_dispatch) 가능.
# 측정 대상은 production URL (https://bigtablet.com) — CDN + 실 백엔드 환경에서 정직한 점수.
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".github/**"
      - ".claude/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [mobile, desktop]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse CI (${{ matrix.preset }})
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.${{ matrix.preset }}.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          artifactName: lighthouse-results-${{ matrix.preset }}

      - name: Post Lighthouse report to PR
        # PR 컨텍스트에서만 코멘트. workflow_dispatch 는 context.issue.number 없음 → skip.
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PRESET: ${{ matrix.preset }}
        with:
          script: |
            const results = ${{ steps.lhci.outputs.manifest }};
            const links = ${{ steps.lhci.outputs.links }};
            const preset = process.env.PRESET;
            const presetLabel = preset === 'mobile' ? '📱 Mobile' : '🖥 Desktop';
            const marker = `<!-- lighthouse-report-${preset} -->`;

            const rows = results.map((r) => {
              const url = new URL(r.url);
              const path = url.pathname;
              const s = (v) => Math.round(v * 100);
              const emoji = (v) => (v >= 0.9 ? '🟢' : v >= 0.5 ? '🟠' : '🔴');
              const perf = r.summary.performance;
              const a11y = r.summary.accessibility;
              const bp = r.summary['best-practices'];
              const seo = r.summary.seo;
              const link = links[r.url] || '';
              return `| [${path}](${link}) | ${emoji(perf)} ${s(perf)} | ${emoji(a11y)} ${s(a11y)} | ${emoji(bp)} ${s(bp)} | ${emoji(seo)} ${s(seo)} |`;
            });

            const body = [
              marker,
              `### ⚡ Lighthouse Report — ${presetLabel}`,
              '',
              '| Page | Performance | Accessibility | Best Practices | SEO |',
              '|------|:-----------:|:------------:|:--------------:|:---:|',
              ...rows,
              '',
              `> Results from Lighthouse CI on \`${context.sha.slice(0, 7)}\` against production`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((c) => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
